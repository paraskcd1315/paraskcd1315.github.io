<link rel="apple-touch-icon" sizes="76x76" href="./apple-icon-76x76.png"/><link rel="apple-touch-icon" sizes="114x114" href="./apple-icon-114x114.png"/><link rel="apple-touch-icon" sizes="120x120" href="./apple-icon-120x120.png"/><link rel="apple-touch-icon" sizes="144x144" href="./apple-icon-144x144.png"/><link rel="apple-touch-icon" sizes="152x152" href="./apple-icon-152x152.png"/><link rel="apple-touch-icon" sizes="180x180" href="./apple-icon-180x180.png"/><link rel="icon" type="image/png" sizes="32x32" href="./favicon-32x32.png"/><link rel="icon" type="image/png" sizes="96x96" href="./favicon-96x96.png"/><link rel="icon" type="image/png" sizes="16x16" href="./favicon-16x16.png"/><link rel="manifest" href="./manifest.json"/><title>Paras Khanchandani — Full-stack engineer</title><script>"scrollRestoration"in history&&(history.scrollRestoration="manual")</script><script defer="defer" src="./static/js/main.8621979e.js"></script><link href="./static/css/main.915948af.css" rel="stylesheet"></head><body><noscript><header><h1>Paras Khanchandani</h1><p>Fullstack developer at Unimedia Technology. Currently in Castelldefels, Barcelona. Originally from Tenerife, Canary Islands.</p><p>Email: <a href="mailto:dev@paraskcd.com">dev@paraskcd.com</a></p></header><section><h2>About</h2><article><h3>Full Stack Developer</h3><p>I'm a Software Engineer at Unimedia Technology, where I make full scalable Web as well as Mobile Applications with technologies like C# .NET, Blazor WASM, ReactJS, NextJS, Swift, Kotlin and Jetpack Compose. Every project gets me to learn something new, a new tool, framework or architecture problem to solve.</p></article><article><h3>DevOps and self-hosting</h3><p>I'm adaptable at implementing Docker based containers and providing DevOps solutions on platforms like Microsoft Azure, AWS and CI/CD pipelines. I also self host a few of my own platforms on a home server, as I like to understand the full stack from the bottom up.</p></article><article><h3>Design first</h3><p>I sketch in Figma before I touch the editor. I'm able to deliver user-centric solutions focusing on performance, security and maintainability.</p></article><article><h3>Team player, Agile by default</h3><p>I'm a good team player with experience in Agile Environments, using tools like Jira and Git to ensure proper coordination of multiple projects among team members. Programming is my passion, it lets me keep learning and solve problems at ease.</p></article><article><h3>Outside of work</h3><p>I love space, I love science. I watch a lot of YouTube videos on astrophysics, cosmology, black holes, quantum physics and new research. I also kind of think we live in a simulation, and the more I read about it, the more interesting it gets.</p></article><article><h3>Favourite movies and series</h3><p>My favourite movies are The Matrix trilogy, Inception and Interstellar. My favourite series is Mr. Robot.</p></article></section><section><h2>Timeline</h2><article><h3><time datetime="1996-09-15">1996-09-15</time> — Born</h3><p>Tenerife, Canary Islands.</p></article><article><h3><time datetime="2012">2012</time> — First touched design</h3><p>Photoshop, After Effects, the early Adobe-suite curiosity that turned into a serious hobby.</p><p>Tags: Photoshop, After Effects</p></article><article><h3><time datetime="2016">2016</time> — Graduated high school</h3><p>Started college at IGNOU + a parallel course in 3ds Max, Photoshop, After Effects, and Maya. The 3D pipeline foundation.</p><p>Tags: 3ds Max, Maya, Photoshop, After Effects</p></article><article><h3><time datetime="2018">2018</time> — 3D prop design for games</h3><p>Started doing prop design for games — Maya for modeling, Substance Painter for texturing, Marmoset Viewer for presentation, the full PBR workflow. Game-friendly assets, baking maps, surface authoring. Most of the renders in Lens come from this period.</p><p>Tags: Maya, Substance Painter, Marmoset Viewer, PBR</p></article><article><h3><time datetime="2019">2019</time> — First serious dive into JavaScript</h3><p>Started learning JavaScript and React in earnest. Began freelancing on small web projects on the side.</p><p>Tags: JavaScript, React</p></article><article><h3><time datetime="2020">2020</time> — COVID — co-built Nitroless</h3><p>Cydia-style repo GUI system for distributing custom stickers + emojis across messaging apps. Shipped a Swift app + keyboard, Jetpack Compose app + keyboard, a macOS app, and an Electron app — community-driven, multi-platform.</p><p>Tags: Swift, Jetpack Compose, Kotlin, macOS, Electron</p></article><article><h3><time datetime="2021-02">2021-02</time> — Frosty-Glass-Pro</h3><p>Frosted-glass aesthetic theme for jailbroken iPhones — JavaScript / XenHTML on the home screen.</p><p>Tags: JavaScript, XenHTML, iOS jailbreak</p><p>Links: <a href="https://github.com/paraskcd1315/Frosty-Glass-Pro">GitHub</a></p></article><article><h3><time datetime="2021-03">2021-03</time> — libkcdxenhtml</h3><p>JS library that became the foundation for my XenHTML themes — animation, layout, and home-screen widget primitives reused across every jailbreak project after.</p><p>Tags: JavaScript, XenHTML, Library</p><p>Links: <a href="https://github.com/paraskcd1315/libkcdxenhtml">GitHub</a></p></article><article><h3><time datetime="2021-03">2021-03</time> — metroUI</h3><p>Windows-Phone-style home-screen replacement for jailbroken iPhones — live tiles, accent colors, the whole Metro design language ported to iOS via XenHTML.</p><p>Tags: JavaScript, XenHTML, iOS jailbreak</p><p>Links: <a href="https://github.com/paraskcd1315/metroUI">GitHub</a></p></article><article><h3><time datetime="2021-07">2021-07</time> — Influential — first version (iPhone jailbreak)</h3><p>First version of Influential Launcher, for jailbroken iPhones. Built in React on top of XenHTML — a custom home-screen launcher with my own layout + interaction system. Spiritual ancestor to the 2025 native Android rewrite.</p><p>Tags: React, JavaScript, XenHTML, iOS jailbreak</p><p>Links: <a href="https://github.com/paraskcd1315/influential-11-react">GitHub</a></p></article><article><h3><time datetime="2021-09">2021-09</time> — First job — Vidhema Technologies</h3><p>3 months. Worked across Node.js, React, and Angular — first time shipping production code on someone else's stack.</p><p>Tags: Node.js, React, Angular</p></article><article><h3><time datetime="2022-03">2022-03</time> — Moved to Canada — built United Walls solo</h3><p>Wallpaper-sharing platform with a SwiftUI iOS app, a Jetpack Compose Android app, a Grammy bot for Telegram, and a self-hosted Node/Express/Mongoose backend on a Raspberry Pi. First deep dive into Docker and self-hosting.</p><p>Tags: SwiftUI, Jetpack Compose, Node.js, Express, Mongoose, Docker, Raspberry Pi</p></article><article><h3><time datetime="2023-09">2023-09</time> — Moved to Sitges, Barcelona, Spain</h3><p>New chapter.</p></article><article><h3><time datetime="2023-11">2023-11</time> — Joined Unimedia Technology</h3><p>Started with Angular (had been React-only before), then picked up .NET for APIs, PHP, Ionic, and a wider full-stack practice.</p><p>Tags: Angular, .NET, PHP, Ionic</p></article><article><h3><time datetime="2025-07">2025-07</time> — Shipped SpotlightSearch</h3><p>Android app inspired by macOS Spotlight — quick app launcher, contact search with call/SMS/WhatsApp shortcuts, inline calculator + unit conversions, Google search suggestions. Pure Kotlin. Shipped to the Play Store.</p><p>Tags: Kotlin, Android, Play Store</p><p>Links: <a href="https://github.com/paraskcd1315/SpotlightSearch">GitHub</a>, <a href="https://play.google.com/store/apps/details?id=com.paraskcd.spotlightsearch">Play Store</a></p></article><article><h3><time datetime="2025-08">2025-08</time> — Influential Launcher — native Android rewrite</h3><p>Started over from scratch in pure Kotlin. Native Android launcher this time, no jailbreak — the same product idea, four years later, on a real platform.</p><p>Tags: Kotlin, Android, Launcher</p><p>Links: <a href="https://github.com/paraskcd1315/InfluentialLauncher">GitHub</a></p></article><article><h3><time datetime="2025-12">2025-12</time> — AI-assisted coding</h3><p>Started experimenting. Learned the limitations and the sharp edges, but also where it genuinely accelerates work.</p><p>Tags: AI</p></article><article><h3><time datetime="2026-01">2026-01</time> — Started KCDSearch — cross-platform search</h3><p>Personal-knowledge search across the apps I use. Web client first (TypeScript, Jan 2026), then native Android (Kotlin, Feb 2026), then native Apple (Swift, Mar 2026). Three platforms, one product surface.</p><p>Tags: TypeScript, Kotlin, Swift, Android, Apple</p><p>Links: <a href="https://github.com/paraskcd1315/KCDSearch-Web">Web</a>, <a href="https://github.com/paraskcd1315/KCDSearch-Android">Android</a>, <a href="https://github.com/paraskcd1315/KCDSearch-Apple">Apple</a></p></article><article><h3><time datetime="2026-02">2026-02</time> — Built ClaudeContext</h3><p>Workflow + memory system around AI-assisted development. Context-driven sessions, Jira/Toggl/RAG integration, MCP server for structured code intelligence. Ongoing — getting iterated on continuously.</p><p>Tags: AI, workflow, memory system, MCP</p></article><article><h3><time datetime="2026-03">2026-03</time> — Started ContextOS</h3><p>Backend-and-frontend stack experiment: .NET 10 API with Hot Chocolate GraphQL + EF Core + PostgreSQL with pgvector for semantic search, paired with a React 19 + TypeScript + Apollo Client frontend.</p><p>Tags: .NET 10, Hot Chocolate, GraphQL, EF Core, PostgreSQL, pgvector, React 19, Apollo Client</p><p>Links: <a href="https://github.com/KCD-ContextOS/contextos-server">Server</a>, <a href="https://github.com/KCD-ContextOS/contextos-web">Web</a></p></article><article><h3><time datetime="2026-03">2026-03</time> — Started MeetingMonitor</h3><p>Native macOS Swift app for monitoring meeting state — small, focused tool built around the daily-work pain point of context switching during calls.</p><p>Tags: Swift, macOS</p></article></section><section><h2>Tools and tech</h2><ul><li>.NET Core, C#, Blazor WASM</li><li>ReactJS, NextJS, AngularJS, JavaScript, Redux</li><li>Swift, SwiftUI, Kotlin, Jetpack Compose</li><li>NodeJS, ExpressJS, MongoDB, Mongoose</li><li>ElectronJS</li><li>Microsoft Azure DevOps, AWS, Docker, CI/CD</li><li>Figma, Adobe Photoshop, Adobe After Effects, Final Cut Pro</li></ul></section><section><h2>Selected work</h2><article><h3>KCD Search for Android</h3><p>Kotlin, Jetpack Compose, Hilt, Retrofit, Coroutines.</p><p><a href="https://github.com/paraskcd1315/KCDSearch-Android" target="_blank" rel="noopener noreferrer">github.com/paraskcd1315/KCDSearch-Android</a></p></article><article><h3>Influential Launcher for Android</h3><p>Kotlin, Jetpack Compose, Custom launcher.</p><p><a href="https://github.com/paraskcd1315/InfluentialLauncher" target="_blank" rel="noopener noreferrer">github.com/paraskcd1315/InfluentialLauncher</a></p></article><article><h3>Spotlight Search for Android</h3><p>Kotlin, Jetpack Compose, Hilt, OkHttp, Google Suggestion API. Available on Google Play.</p><p><a href="https://play.google.com/store/apps/details?id=com.paraskcd.spotlightsearch" target="_blank" rel="noopener noreferrer">Play Store, com.paraskcd.spotlightsearch</a></p></article><article><h3>United Walls</h3><p>Full stack project. ExpressJS, Mongoose, Grammy bot for Telegram, iOS app in SwiftUI, Android app in Jetpack Compose, hosted in house on a Raspberry Pi.</p><p><a href="https://github.com/United-Walls" target="_blank" rel="noopener noreferrer">github.com/United-Walls</a></p></article></section><section><h2>Through the lens</h2><p>Personal 3D renders, off hours work. More on Artstation.</p><ul><li><a href="https://www.artstation.com/artwork/N5J9Eb" target="_blank" rel="noopener noreferrer">Cyber Punk Alley Project</a></li><li><a href="https://www.artstation.com/artwork/RYJ08O" target="_blank" rel="noopener noreferrer">A Psychopath's Dream Project</a></li><li><a href="https://www.artstation.com/artwork/mq1exy" target="_blank" rel="noopener noreferrer">AKM Rifle Project</a></li><li><a href="https://www.artstation.com/artwork/nQ8L5o" target="_blank" rel="noopener noreferrer">Vintage Generator Machinery Project</a></li><li><a href="https://www.artstation.com/artwork/w8yBL6" target="_blank" rel="noopener noreferrer">Wooden Lever Project</a></li><li><a href="https://www.artstation.com/artwork/e059a3" target="_blank" rel="noopener noreferrer">Mechanical Carriage Project</a></li><li><a href="https://www.artstation.com/artwork/EVXJLA" target="_blank" rel="noopener noreferrer">Gaming Prop Project</a></li></ul><p><a href="https://www.artstation.com/paraskcd" target="_blank" rel="noopener noreferrer">artstation.com/paraskcd</a></p></section><section><h2>Watch</h2><ul><li><a href="https://www.youtube.com/watch?v=zcWLPPgVnTM" target="_blank" rel="noopener noreferrer">Showreel</a></li><li><a href="https://www.youtube.com/watch?v=RYQVfypDQKY" target="_blank" rel="noopener noreferrer">XenHTML setup for jailbroken iPhones</a></li><li><a href="https://www.youtube.com/watch?v=GpaYbYNGciI" target="_blank" rel="noopener noreferrer">Windows Phone UI on iPhone, with XenHTML</a></li></ul></section><section><h2>Contact</h2><ul><li>Email: <a href="mailto:dev@paraskcd.com">dev@paraskcd.com</a></li><li><a href="https://github.com/paraskcd1315" target="_blank" rel="noopener noreferrer">GitHub, paraskcd1315</a></li><li><a href="https://www.linkedin.com/in/parakcd/" target="_blank" rel="noopener noreferrer">LinkedIn, parakcd</a></li><li><a href="https://www.artstation.com/paraskcd" target="_blank" rel="noopener noreferrer">Artstation, paraskcd</a></li></ul></section><p><small>This is a static SEO fallback. The interactive site requires JavaScript.</small></p></noscript><div id="root"></div></body></html>
